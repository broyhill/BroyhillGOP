# ============================================================================
# BroyhillGOP Hetzner AX162 — PostgreSQL 16 Performance Tuning
# ============================================================================
# Hardware: 96 vCPU (AMD EPYC), 251 GB RAM, 2x 1.7TB NVMe RAID1
# Workload: 3,000 concurrent users, mixed OLTP + analytics
# Database: ~150GB current, growing to ~300GB+ with FEC + activity logs
# ============================================================================
# Deploy: Copy to /etc/postgresql/16/main/conf.d/99-broyhillgop.conf
#         Then: systemctl restart postgresql
# ============================================================================

# --- MEMORY ---
# 25% of RAM for shared_buffers on a dedicated DB server
shared_buffers = 64GB

# Per-operation sort/hash memory. With 3K users * potential parallel queries,
# keep moderate. 256MB * 3000 connections = 750GB theoretical max, but most
# queries won't use the full allocation. 64MB is aggressive but this box has RAM.
work_mem = 64MB

# For CREATE INDEX, VACUUM, etc. — can be high on dedicated server
maintenance_work_mem = 4GB

# Tell the planner about OS cache — ~75% of RAM
effective_cache_size = 192GB

# WAL buffers — auto-tune from shared_buffers, but set explicitly
wal_buffers = 256MB

# --- CONNECTIONS ---
# 3,000 users go through a connection pooler (PgBouncer). Direct PG connections
# should be limited. If no pooler yet, set higher initially.
max_connections = 500

# --- PARALLELISM ---
# This box has 96 cores — let PostgreSQL use them
max_worker_processes = 48
max_parallel_workers = 32
max_parallel_workers_per_gather = 8
max_parallel_maintenance_workers = 8

# --- DISK I/O (NVMe RAID1) ---
# NVMe = non-rotational, high IOPS
random_page_cost = 1.1
seq_page_cost = 1.0
effective_io_concurrency = 200

# --- WAL / CHECKPOINT ---
max_wal_size = 8GB
min_wal_size = 2GB
checkpoint_completion_target = 0.9
wal_compression = zstd

# --- PLANNER ---
# Higher statistics target = better query plans on large tables
default_statistics_target = 500

# Enable JIT for complex analytical queries
jit = on
jit_above_cost = 100000
jit_inline_above_cost = 500000
jit_optimize_above_cost = 500000

# --- HUGE PAGES ---
# With 64GB shared_buffers, huge pages reduce TLB misses significantly
huge_pages = try

# --- AUTOVACUUM (aggressive for high-write workload) ---
autovacuum_max_workers = 6
autovacuum_naptime = 30s
autovacuum_vacuum_threshold = 50
autovacuum_vacuum_scale_factor = 0.02
autovacuum_analyze_threshold = 50
autovacuum_analyze_scale_factor = 0.01
autovacuum_vacuum_cost_delay = 2ms
autovacuum_vacuum_cost_limit = 2000

# --- LOGGING ---
log_min_duration_statement = 1000
log_checkpoints = on
log_lock_waits = on
log_temp_files = 0
log_autovacuum_min_duration = 500ms

# --- MISC ---
# Preload pg_stat_statements for query monitoring
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all
