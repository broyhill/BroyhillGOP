const IC={py:'&#128013;',sql:'&#128451;',md:'&#128196;',html:'&#127760;',docx:'&#128195;',csv:'&#128202;',xlsx:'&#128202;',json:'&#128214;',js:'&#9881;',css:'&#127912;',numbers:'&#128202;',sh:'&#9881;',pdf:'&#128213;',txt:'&#128196;',ts:'&#9881;'};
function gi(t){return IC[t]||'&#128196;'}
let af='all';
const cats=[...new Set(FILES.map(f=>f.cat))];
const tc={};FILES.forEach(f=>{tc[f.type]=(tc[f.type]||0)+1});
document.getElementById('tf').textContent=FILES.length;
function bf(){
  const el=document.getElementById('fp');
  let h='<div class="pill active" data-f="all">All <span class="ct">'+FILES.length+'</span></div>';
  ['py','sql','md','docx','html','js','css','csv','xlsx','json','pdf','txt','sh','numbers'].forEach(t=>{
    if(tc[t]) h+='<div class="pill" data-f="'+t+'">'+t.toUpperCase()+' <span class="ct">'+tc[t]+'</span></div>';
  });
  el.innerHTML=h;
  el.querySelectorAll('.pill').forEach(p=>{p.onclick=()=>{el.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));p.classList.add('active');af=p.dataset.f;render()}});
}
function hl(t,terms){if(!terms.length)return t;let r=t;terms.forEach(q=>{const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');r=r.replace(re,'<span class="hl">$1</span>')});return r}
function render(){
  const q=document.getElementById('si').value.trim().toLowerCase();
  const terms=q?q.split(/\s+/):[];
  let fl=FILES;
  if(af!=='all')fl=fl.filter(f=>f.type===af);
  if(terms.length)fl=fl.filter(f=>{const b=(f.name+' '+f.cat).toLowerCase();return terms.every(t=>b.includes(t))});
  document.getElementById('ri').textContent=fl.length+' of '+FILES.length+' files'+(q?' matching "'+q+'"':'');
  const g={};fl.forEach(f=>{if(!g[f.cat])g[f.cat]=[];g[f.cat].push(f)});
  let h='';
  const co=cats.filter(c=>g[c]);
  co.forEach(cat=>{
    const fs=g[cat];const io=terms.length>0||co.length<=4;
    h+='<div class="section"><div class="sh'+(io?' open':'')+'" onclick="ts(this)">';
    h+='<span class="sn">'+cat+'</span><span class="sc">'+fs.length+'</span><span class="ar">&#9654;</span></div>';
    h+='<div class="sf'+(io?' open':'')+'">';
    fs.forEach(f=>{
      h+='<div class="fr"><span class="ic">'+gi(f.type)+'</span>';
      h+='<span class="fn" title="'+f.path+'">'+hl(f.name,terms)+'</span>';
      h+='<span><span class="badge '+(f.type||'other')+'">'+f.type+'</span></span>';
      h+='<span><a class="bo" href="file://'+encodeURI(f.path)+'">OPEN</a></span>';
      h+='<span><a class="bf" href="file://'+encodeURI(f.path.substring(0,f.path.lastIndexOf('/')))+'">DIR</a></span>';
      h+='<span class="fsz">'+f.sz+'</span></div>';
    });
    h+='</div></div>';
  });
  document.getElementById('mc').innerHTML=h||'<div style="padding:40px;text-align:center;color:#9ca3af">No files match</div>';
}
function ts(el){el.classList.toggle('open');el.nextElementSibling.classList.toggle('open')}
bf();render();
let db;document.getElementById('si').addEventListener('input',()=>{clearTimeout(db);db=setTimeout(render,120)});
document.addEventListener('keydown',e=>{if(e.key==='/'&&document.activeElement.tagName!=='INPUT'){e.preventDefault();document.getElementById('si').focus()}if(e.key==='Escape'){document.getElementById('si').value='';render()}});
</script>
