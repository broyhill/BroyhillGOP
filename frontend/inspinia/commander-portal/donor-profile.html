<!DOCTYPE html>
<html lang="en" data-sidenav-size="default" data-layout-mode="light" data-topbar-color="dark" data-menu-color="dark">
<head>
    <meta charset="utf-8">
    <title>Donor Profile | BroyhillGOP Commander</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="assets/images/favicon.ico">
    <script src="assets/js/config.js"></script>
    <link href="assets/css/vendors.min.css" rel="stylesheet" type="text/css">
    <link href="assets/css/app.min.css" rel="stylesheet" type="text/css">
    <style>
        .donor-badge { font-size: 0.75rem; padding: 3px 10px; border-radius: 12px; }
        .mega { background: #e74c3c; color: #fff; }
        .major { background: #f39c12; color: #fff; }
        .mid { background: #3498db; color: #fff; }
        .base { background: #95a5a6; color: #fff; }
        .profile-header { background: linear-gradient(135deg, #1a1c2c 0%, #2d3561 100%); }
        .stat-mini { text-align: center; padding: 12px; }
        .giving-bar { height: 6px; border-radius: 3px; background: #e9ecef; }
        .giving-fill { height: 100%; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div id="sidebar-container" data-active="donor"></div>
        <div id="topbar-container" data-title="DONOR INTELLIGENCE"></div>

        <div class="page-content">
            <div class="container-fluid">
                <!-- Profile Header Card -->
                <div class="card profile-header text-white border-0 mb-4">
                    <div class="card-body p-4">
                        <div class="row align-items-center">
                            <div class="col-md-1 text-center">
                                <div class="avatar-lg bg-white bg-opacity-25 rounded-circle d-flex align-items-center justify-content-center mx-auto">
                                    <i class="ti ti-user fs-32 text-white"></i>
                                </div>
                            </div>
                            <div class="col-md-7">
                                <h2 class="fw-bold mb-1" id="donorName">Loading...</h2>
                                <p class="mb-0 opacity-75" id="donorSubtitle"></p>
                                <div class="mt-2" id="donorBadges"></div>
                            </div>
                            <div class="col-md-4 text-end">
                                <h1 class="display-5 fw-bold text-warning mb-0" id="donorTotal"></h1>
                                <p class="text-white-50 mb-0">Total Contributions</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Stats Row -->
                <div class="row mb-4" id="statsRow"></div>

                <!-- Main Content -->
                <div class="row">
                    <!-- Left Column -->
                    <div class="col-md-8">
                        <div class="card border-0 shadow-sm mb-4">
                            <div class="card-header bg-transparent border-bottom">
                                <h5 class="card-title mb-0"><i class="ti ti-building me-2"></i>SIC Classification Intelligence</h5>
                            </div>
                            <div class="card-body" id="sicCard"></div>
                        </div>
                        <div class="card border-0 shadow-sm mb-4">
                            <div class="card-header bg-transparent border-bottom">
                                <h5 class="card-title mb-0"><i class="ti ti-arrows-exchange me-2"></i>Cross-Committee Giving Network</h5>
                            </div>
                            <div class="card-body" id="crossCommittee"></div>
                        </div>

                        <div class="card border-0 shadow-sm mb-4">
                            <div class="card-header bg-transparent border-bottom">
                                <h5 class="card-title mb-0"><i class="ti ti-chart-bar me-2"></i>Giving Timeline</h5>
                            </div>
                            <div class="card-body">
                                <canvas id="givingTimeline" height="200"></canvas>
                            </div>
                        </div>
                    </div>

                    <!-- Right Column -->
                    <div class="col-md-4">
                        <div class="card border-0 shadow-sm mb-4">
                            <div class="card-header bg-transparent border-bottom">
                                <h5 class="card-title mb-0"><i class="ti ti-building-bank me-2"></i>Regulatory Access</h5>
                            </div>
                            <div class="card-body" id="regulatoryAccess"></div>
                        </div>

                        <div class="card border-0 shadow-sm mb-4">
                            <div class="card-header bg-transparent border-bottom">
                                <h5 class="card-title mb-0"><i class="ti ti-network me-2"></i>Political Network</h5>
                            </div>
                            <div class="card-body" id="politicalNetwork"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/vendors.min.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="nav.js"></script>
    <script src="donors-data.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
    // Extended donor profiles with deep intelligence
    const PROFILES = {
        1: { crossCommittees: [{name:'NC Republican Party',amt:25000},{name:'NCGOP Victory Fund',amt:15000},{name:'Sen. Tillis Campaign',amt:5800}],
             regulatory: [{bill:'HB 589 - Solar Energy',risk:'HIGH',note:'Real estate holdings near proposed solar farm corridors'},{bill:'SB 445 - Zoning Reform',risk:'CRITICAL',note:'Direct impact on commercial property development'}],
             network: ['Sen. Wesley Meredith','Rep. John Szoka','Fayetteville Chamber Chair','Cumberland Co. GOP Chair'],
             timeline: [28000,32000,18000,22000,35000,34100] },
        2: { crossCommittees: [{name:'NC Republican Party',amt:8000},{name:'Cumberland Co. GOP',amt:3500}],
             regulatory: [{bill:'SB 312 - Tort Reform',risk:'HIGH',note:'Legal practice directly affected by tort cap changes'}],
             network: ['Cumberland Bar Association','NC Advocates for Justice'],
             timeline: [4000,5200,3800,4100,4200,4100] },
        3: { crossCommittees: [{name:'NC Insurance Commissioner',amt:5400},{name:'NC Republican Party',amt:4000}],
             regulatory: [{bill:'SB 312 - Insurance Rates',risk:'CRITICAL',note:'Insurance agency revenue directly tied to rate structures'},{bill:'HB 288 - Health Coverage',risk:'HIGH',note:'Health insurance product line affected'}],
             network: ['NC Insurance Agents Assoc.','Fayetteville Business Council'],
             timeline: [3500,4200,3800,4000,3800,3300] },
        4: { crossCommittees: [{name:'NC Republican Party',amt:6000},{name:'Cumberland Co. GOP',amt:2800}],
             regulatory: [{bill:'HB 741 - Contractor Licensing',risk:'CRITICAL',note:'Construction company requires state licensing'},{bill:'SB 189 - Building Codes',risk:'HIGH',note:'Building code changes affect project costs'}],
             network: ['NC Home Builders Assoc.','AGC of America - NC Chapter'],
             timeline: [3200,4100,3500,4000,3800,3500] },
        5: { crossCommittees: [{name:'NC Senate Caucus',amt:10000},{name:'NC Republican Party',amt:5000}],
             regulatory: [{bill:'SB 312 - Tort Reform',risk:'HIGH',note:'Law firm specializing in litigation affected by tort caps'}],
             network: ['NC Bar Association','Wake Co. Republican Party','Raleigh Chamber'],
             timeline: [2500,3100,2800,3200,2900,2600] },
        6: { crossCommittees: [{name:'NC Republican Party',amt:4500},{name:'NC Bankers PAC',amt:3200}],
             regulatory: [{bill:'HB 924 - Banking Reform',risk:'HIGH',note:'Community bank operations affected by capital requirements'}],
             network: ['NC Bankers Association','Fayetteville Downtown Alliance'],
             timeline: [2400,2800,2600,3000,2700,2600] },
        7: { crossCommittees: [{name:'NC Republican Party',amt:10000},{name:'Sen. Burr Campaign',amt:5800},{name:'Trump Victory NC',amt:5000}],
             regulatory: [{bill:'HB 185 - Pharma Pricing',risk:'CRITICAL',note:'Former pharma CEO, significant portfolio exposure'},{bill:'SB 522 - Drug Importation',risk:'HIGH',note:'International pharma supply chain interests'}],
             network: ['PhRMA Board (former)','Greensboro CEO Roundtable','NC Life Sciences Council'],
             timeline: [2200,2800,2400,2600,2100,2100] },
        8: { crossCommittees: [{name:'NC Republican Party',amt:3000}],
             regulatory: [{bill:'SB 445 - Zoning Reform',risk:'HIGH',note:'Investment property portfolio in Cumberland County'}],
             network: ['Fayetteville Real Estate Board','Cumberland Co. GOP Women'],
             timeline: [1800,2200,2100,2400,2000,2100] },
        9: { crossCommittees: [{name:'NC Medical Society PAC',amt:4200},{name:'NC Republican Party',amt:2800}],
             regulatory: [{bill:'HB 288 - Health Coverage',risk:'HIGH',note:'Hospital system executive, healthcare policy exposure'},{bill:'SB 671 - Medicaid Expansion',risk:'CRITICAL',note:'Hospital reimbursement directly affected'}],
             network: ['NC Medical Society','Cape Fear Valley Board','NC Hospital Association'],
             timeline: [1800,2100,2000,2200,2100,1900] },
        10: { crossCommittees: [{name:'NC Republican Party',amt:5000},{name:'Wake Co. GOP',amt:2000}],
              regulatory: [{bill:'HB 932 - Data Privacy',risk:'MEDIUM',note:'Technology company may face new data compliance costs'}],
              network: ['NC Technology Association','Raleigh Chamber of Commerce'],
              timeline: [1600,2000,1800,2200,2100,1900] }
    };
    // Default profile for donors 11-20 and beyond
    function getDefaultProfile(donor) {
        return {
            crossCommittees: [{name:'NC Republican Party',amt: Math.round(donor.amount * 0.15)},{name:'County GOP',amt: Math.round(donor.amount * 0.08)}],
            regulatory: [{bill:'General Regulatory',risk:'MEDIUM',note:`${donor.industry} sector may be affected by pending legislation`}],
            network: ['Local Chamber of Commerce','County Republican Party'],
            timeline: [Math.round(donor.amount*0.14),Math.round(donor.amount*0.18),Math.round(donor.amount*0.16),Math.round(donor.amount*0.19),Math.round(donor.amount*0.17),Math.round(donor.amount*0.16)]
        };
    }

    // Render the profile
    const id = parseInt(new URLSearchParams(window.location.search).get('id')) || 1;
    const donor = DONORS.find(d => d.rank === id) || DONORS[0];
    const profile = PROFILES[id] || getDefaultProfile(donor);
    const tierMap = {mega:'mega',major:'major',mid:'mid',base:'base'};

    document.getElementById('donorName').textContent = donor.name;
    document.getElementById('donorSubtitle').textContent = `${donor.employer} • ${donor.city}, NC • SIC ${donor.sic}`;
    document.getElementById('donorTotal').textContent = '$' + donor.amount.toLocaleString();
    document.getElementById('donorBadges').innerHTML = `
        <span class="donor-badge ${tierMap[donor.tier]}">${donor.tier.toUpperCase()} DONOR</span>
        <span class="badge bg-info bg-opacity-25 text-white ms-2 px-2">${donor.industry}</span>
        <span class="badge bg-success bg-opacity-25 text-white ms-2 px-2">${donor.donations} donations</span>`;

    // Stats row
    document.getElementById('statsRow').innerHTML = `
        <div class="col-md-3"><div class="card border-0 shadow-sm"><div class="stat-mini">
            <h4 class="fw-bold text-primary mb-0">${donor.donations}</h4><small class="text-muted">Donations</small>
        </div></div></div>
        <div class="col-md-3"><div class="card border-0 shadow-sm"><div class="stat-mini">
            <h4 class="fw-bold text-success mb-0">$${Math.round(donor.amount/donor.donations).toLocaleString()}</h4><small class="text-muted">Avg Gift</small>
        </div></div></div>
        <div class="col-md-3"><div class="card border-0 shadow-sm"><div class="stat-mini">
            <h4 class="fw-bold text-info mb-0">${profile.crossCommittees.length + 1}</h4><small class="text-muted">Committees</small>
        </div></div></div>
        <div class="col-md-3"><div class="card border-0 shadow-sm"><div class="stat-mini">
            <h4 class="fw-bold text-warning mb-0">${profile.regulatory.length}</h4><small class="text-muted">Reg. Exposures</small>
        </div></div></div>`;

    // SIC Card
    document.getElementById('sicCard').innerHTML = `
        <div class="row">
            <div class="col-md-6">
                <h6 class="text-muted text-uppercase fs-12">Employer</h6>
                <p class="fw-bold fs-16 mb-2">${donor.employer}</p>
                <h6 class="text-muted text-uppercase fs-12">SIC Code</h6>
                <p class="fw-bold fs-16 mb-2">${donor.sic} — ${donor.industry}</p>
                <h6 class="text-muted text-uppercase fs-12">Classification Method</h6>
                <p class="mb-0"><span class="badge bg-primary">Layer 1: Employer Keyword Match</span></p>
            </div>
            <div class="col-md-6">
                <h6 class="text-muted text-uppercase fs-12">Industry Group Analysis</h6>
                <p class="text-muted fs-13 mb-2">This donor's employer was matched via the SIC keyword classification engine using 272 ILIKE patterns against the employer_sic_master table.</p>
                <div class="alert alert-info bg-info bg-opacity-10 border-info mb-0">
                    <small><strong>Intelligence:</strong> ${donor.industry} sector represents significant regulatory exposure in the current NC legislative session. ${profile.regulatory.length} bill(s) directly impact this donor's business interests.</small>
                </div>
            </div>
        </div>`;

    // Cross-committee giving
    const maxCC = Math.max(donor.amount, ...profile.crossCommittees.map(c=>c.amt));
    document.getElementById('crossCommittee').innerHTML = `
        <div class="mb-3">
            <div class="d-flex justify-content-between mb-1"><span class="fw-semibold">Dave Boliek for Auditor</span><span class="text-success fw-bold">$${donor.amount.toLocaleString()}</span></div>
            <div class="giving-bar"><div class="giving-fill bg-primary" style="width:${(donor.amount/maxCC*100).toFixed(0)}%"></div></div>
        </div>
        ${profile.crossCommittees.map(c => `
            <div class="mb-3">
                <div class="d-flex justify-content-between mb-1"><span class="fw-semibold">${c.name}</span><span class="text-muted">$${c.amt.toLocaleString()}</span></div>
                <div class="giving-bar"><div class="giving-fill bg-info" style="width:${(c.amt/maxCC*100).toFixed(0)}%"></div></div>
            </div>
        `).join('')}
        <p class="text-muted fs-12 mb-0 mt-2"><i class="ti ti-info-circle me-1"></i>Total across all committees: $${(donor.amount + profile.crossCommittees.reduce((s,c)=>s+c.amt,0)).toLocaleString()}</p>`;

    // Regulatory Access
    const riskColors = {CRITICAL:'danger',HIGH:'warning',MEDIUM:'info',LOW:'secondary'};
    document.getElementById('regulatoryAccess').innerHTML = profile.regulatory.map(r => `
        <div class="mb-3 p-3 bg-light rounded" style="border-left:3px solid var(--bs-${riskColors[r.risk]})">
            <div class="d-flex justify-content-between align-items-start mb-1">
                <strong class="fs-13">${r.bill}</strong>
                <span class="badge bg-${riskColors[r.risk]}">${r.risk}</span>
            </div>
            <p class="text-muted fs-12 mb-0">${r.note}</p>
        </div>
    `).join('');

    // Political Network
    document.getElementById('politicalNetwork').innerHTML = profile.network.map(n =>
        `<div class="d-flex align-items-center mb-2">
            <div class="avatar-xs bg-primary bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center me-2">
                <i class="ti ti-user fs-14 text-primary"></i>
            </div>
            <span class="fs-13">${n}</span>
        </div>`
    ).join('');

    // Giving Timeline Chart
    const tlCtx = document.getElementById('givingTimeline').getContext('2d');
    new Chart(tlCtx, {
        type: 'line',
        data: {
            labels: ['H1 2023','H2 2023','H1 2024','H2 2024','H1 2025','H2 2025'],
            datasets: [{
                label: 'Contributions ($)',
                data: profile.timeline,
                borderColor: '#2d3561',
                backgroundColor: 'rgba(45,53,97,0.1)',
                fill: true, tension: 0.4, pointRadius: 5,
                pointBackgroundColor: '#2d3561'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true, ticks: { callback: v => '$'+v.toLocaleString() } } }
        }
    });
    </script>
</body>
</html>
