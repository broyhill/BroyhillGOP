# ============================================================================
# BroyhillGOP PostgreSQL 16 Tuning
# Server: Hetzner AX162 — 96 CPU (EPYC 9454P), 251GB RAM, 2x1.7TB NVMe RAID1
# Applied: 2026-04-13
# ============================================================================

# --- Connection ---
listen_addresses = '127.0.0.1'         # SECURITY: localhost only. Use SSH tunnel or pgbouncer for remote.
                                       # Was '*' — exposed PG to entire internet
port = 5432
max_connections = 100                  # Sufficient for now. Add pgbouncer before scaling past this.
superuser_reserved_connections = 3

# --- Memory ---
shared_buffers = 63GB                  # 25% of 251GB RAM. Was 128MB.
huge_pages = on                        # Requires vm.nr_hugepages=33868 in sysctl
work_mem = 128MB                       # Per sort/hash op. Conservative: 128MB × 100 conns × ~3 ops = 37GB worst case.
                                       # Was 4MB. Increase to 256MB if connection count stays low.
maintenance_work_mem = 4GB             # For VACUUM, CREATE INDEX, ALTER TABLE. Was 64MB.
autovacuum_work_mem = 1GB              # Per autovacuum worker. Was -1 (64MB fallback).
effective_cache_size = 188GB           # 75% of RAM. Planner hint only, not allocated. Was 4GB.
temp_buffers = 64MB                    # Per-session temp table cache. Default 8MB.

# --- WAL / Checkpoints ---
wal_level = replica                    # Already set. Required for PITR + future streaming replication.
archive_mode = on                      # ENABLE WAL archiving for point-in-time recovery.
archive_command = 'test ! -f /backup/wal/%f && cp %p /backup/wal/%f'
                                       # Copy WAL segments to local backup dir.
                                       # TODO: Add rsync to remote/S3 for offsite backup.
max_wal_size = 16GB                    # Larger WAL window = fewer checkpoints during bulk loads. Was 1GB.
min_wal_size = 1GB                     # Keep more WAL around. Was 80MB.
wal_buffers = 64MB                     # Was 4MB. -1 = auto (1/32 of shared_buffers) = 2GB which is too much.
checkpoint_completion_target = 0.9     # Already set. Spread checkpoint I/O over 90% of interval.
checkpoint_timeout = 15min             # Was 5min. Longer interval = fewer checkpoint stalls during bulk ops.
wal_compression = zstd                 # PG16 feature. Reduces WAL volume ~60% on NVMe. Was off.

# --- Parallelism ---
max_worker_processes = 96              # Match CPU count. Was 8.
max_parallel_workers = 48              # Half of CPUs for parallel queries. Was 8.
max_parallel_workers_per_gather = 8    # Per-query parallelism. Was 2.
max_parallel_maintenance_workers = 8   # CREATE INDEX, VACUUM in parallel. Was 2.

# --- NVMe Storage ---
random_page_cost = 1.1                 # NVMe: random ≈ sequential. Was 4.0 (spinning disk default).
seq_page_cost = 1.0
effective_io_concurrency = 200         # NVMe can handle many concurrent I/O requests. Was 1.
maintenance_io_concurrency = 100       # For VACUUM, CREATE INDEX.

# --- Autovacuum ---
autovacuum_max_workers = 6             # Was 3. We have large tables that need parallel vacuuming.
autovacuum_vacuum_scale_factor = 0.02  # Vacuum at 2% dead tuples (vs default 20%).
                                       # For 7.6M row tables: triggers at ~152K dead rows instead of 1.5M.
autovacuum_analyze_scale_factor = 0.01 # Analyze at 1% change. Keeps planner stats fresh.
autovacuum_vacuum_cost_delay = 2ms     # Was 20ms. NVMe can handle aggressive vacuum I/O.
autovacuum_vacuum_cost_limit = 2000    # Was 200. Let vacuum workers do more work per cycle.

# --- Logging ---
log_min_duration_statement = 1000      # Log queries taking >1 second.
log_checkpoints = on                   # Log checkpoint activity for tuning.
log_lock_waits = on                    # Log when queries wait >1s for locks.
log_temp_files = 0                     # Log ALL temp file usage (spills to disk).
log_autovacuum_min_duration = 0        # Log all autovacuum runs.

# --- Extensions ---
shared_preload_libraries = 'pg_stat_statements'   # Query performance tracking. Essential for tuning.

# --- SSL (keep existing) ---
ssl = on
ssl_cert_file = '/etc/ssl/certs/ssl-cert-snakeoil.pem'
ssl_key_file = '/etc/ssl/private/ssl-cert-snakeoil.key'

# --- Dynamic Shared Memory ---
dynamic_shared_memory_type = posix

# --- File Locations (keep existing) ---
data_directory = '/var/lib/postgresql/16/main'
hba_file = '/etc/postgresql/16/main/pg_hba.conf'
ident_file = '/etc/postgresql/16/main/pg_ident.conf'
external_pid_file = '/var/run/postgresql/16-main.pid'
unix_socket_directories = '/var/run/postgresql'
